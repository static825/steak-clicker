<script>
const steak = document.getElementById("steak");

let currentScale = 1;
let targetScale = 1;
let hovered = false;

function lerp(a, b, t) {
    return a + (b - a) * t;
}

steak.addEventListener("mouseenter", () => {
    hovered = true;
});

steak.addEventListener("mouseleave", () => {
    hovered = false;
});

steak.addEventListener("click", () => {
    targetScale -= 0.1;
});

function gameLoop() {
    // Hover target
    if (hovered) {
        targetScale = lerp(targetScale, 1.5, 0.3);
    } else {
        targetScale = lerp(targetScale, 1, 0.3);
    }

    // Smoothly animate the actual scale
    currentScale = lerp(currentScale, targetScale, 0.3);

    steak.style.transform = `scale(${currentScale})`;

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
