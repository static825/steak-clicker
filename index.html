<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steak Clicker</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            background: repeating-linear-gradient(
                90deg,
                #260b12 0px,
                #260b12 35px,
                #321018 35px,
                #321018 70px
            );
            font-family: "Courier New", monospace;
        }

        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .game {
            width: 75%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .shop {
            width: 25%;
            background: rgba(0, 0, 0, 0.25);
            border-left: 4px solid #1b070b;
            box-sizing: border-box;
        }

        .shop h1 {
            margin: 20px 0;
            text-align: center;
            color: white;
            font-size: 32px;
            letter-spacing: 2px;
        }

        #steak {
            width: 256px;
            image-rendering: pixelated;
            cursor: pointer;
            user-select: none;
        }

        #steak:hover {
            transform: scale(1.03);
        }

        #steak:active {
            transform: scale(0.97);
        }
    </style>
</head>

<body>

<div class="container">

    <div class="game">
        <img id="steak" src="textures/steak.png" alt="Steak">
    </div>

    <div class="shop">
        <h1>SHOP</h1>
    </div>

</div>

</body>
</html>
